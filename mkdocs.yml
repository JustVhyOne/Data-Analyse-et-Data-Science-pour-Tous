      - Introduction: partie-5-outils/index.md
      - L'Environnement Virtuel: partie-5-outils/environnement-virtuel.md
      - Git & GitHub Gratuit: partie-5-outils/git-github.md

# -------------------- THÈME MATERIAL (CONFIG AVANCÉE) --------------------
theme:
  name: material
#  custom_dir: docs/overrides          # Pour surcharger des templates si besoin
  language: fr
  logo: assets/images/logo.svg        # À créer
  favicon: assets/images/logo.ico
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

  # Palette de couleurs "Néon / Synthwave Chic"
  palette:
    # Mode Sombre (Recommandé pour le style "Data Science")
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple            # Fond sombre élégant
      accent: cyan                    # Accents néon (liens, boutons)
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair
    # Mode Clair (Alternative)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre

  features:
    # Navigation
    - navigation.instant              # Chargement instantané (SPA)
    - navigation.instant.progress     # Barre de progression lors du chargement
    - navigation.tracking             # Mise à jour de l'URL
    - navigation.tabs                 # Navigation en onglets (en haut)
    - navigation.tabs.sticky          # Onglets collés en haut
    - navigation.sections             # Sections dans la sidebar
    - navigation.expand               # Déplier la sidebar par défaut
    - navigation.indexes              # Utiliser index.md comme page de section
    - navigation.top                  # Bouton "Retour en haut"
    - navigation.footer               # Footer avec liens Précédent/Suivant

    # Recherche
    - search.suggest                  # Suggestions de recherche
    - search.highlight                # Surlignage des termes recherchés
    - search.share                    # Partage de recherche

    # Contenu & Style
    - content.code.annotate           # Annotations dans les blocs de code
    - content.code.copy               # Bouton Copier
    - content.tooltips                # Infobulles (survol d'abbréviations)
    - content.tabs.link               # Onglets synchronisés

    # Esthétique avancée
    - announce.dismiss                # Bannière d'annonce dismissible
    - header.autohide                 # Cache le header au scroll
    - toc.follow                      # Table des matières suit le scroll
    - toc.integrate                   # Intégration fluide de la TOC

# -------------------- EXTENSIONS MARKDOWN --------------------
markdown_extensions:
  # Python Markdown
  - admonition            # Blocs "Note", "Attention", etc.
  - attr_list             # Attributs HTML dans le markdown
  - md_in_html            # Markdown dans du HTML
  - pymdownx.details      # Blocs repliables
  #- pymdownx.superfences  # Imbrication de blocs de code
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets      # Inclure des fichiers externes
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic        # Mode révision (souligné, barré)
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # Pour les formules mathématiques (optionnel)
  - pymdownx.arithmatex:
      generic: true

  # Pour les diagrammes Mermaid (optionnel)
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# -------------------- PLUGINS (INDISPENSABLES POUR LE STYLE AVANCÉ) --------------------
plugins:
  # Recherche optimisée
  - search:
      lang: fr

  # Affichage des dernières modifications Git
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true

  # Génération automatique de miniatures pour les réseaux sociaux
  - social:
      cards_layout_options:
        background_color: "#0D1117"  # Fond sombre
        color: "#00E5FF"             # Texte cyan

  # Minification HTML pour la performance
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
          remove_comments: true

  # Pour inclure des notebooks Jupyter directement (optionnel mais puissant)
  #- mkdocs-jupyter:
  #    execute: false
  #    include_source: true
  #    theme: dark
  #    include_requirejs: true

  # Gestion des redirections (si vous changez des URLs plus tard)
  - redirects:
      redirect_maps:
        # Exemple : 'ancienne-page.md': 'nouvelle-destination.md'

  # Blog (optionnel, pour une section actualités)
  # - blog:
  #     blog_dir: blog
  #     post_dir: "{blog}/posts"
  #     archive: true

# -------------------- CSS & JS PERSONNALISÉS (ANIMATIONS, GLOW, ETC.) --------------------
extra_css:
  - stylesheets/extra.css              # Vos animations CSS personnalisées
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css

extra_javascript:
  - https://cdn.plot.ly/plotly-latest.min.js


